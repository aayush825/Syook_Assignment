name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/devops-assignment

jobs:

  # -----------------------------------------------
  # Stage 1: Lint and Test
  # -----------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        working-directory: task-1/mern/backend
        run: npm install

      - name: Lint backend
        working-directory: task-1/mern/backend
        run: npm run lint

      - name: Test backend
        working-directory: task-1/mern/backend
        run: npm test

      - name: Install frontend dependencies
        working-directory: task-1/mern/frontend
        run: npm install

      - name: Lint frontend
        working-directory: task-1/mern/frontend
        run: npm run lint

      - name: Test frontend
        working-directory: task-1/mern/frontend
        run: npm test

  # -----------------------------------------------
  # Stage 2: Build and Push Docker Images
  # -----------------------------------------------
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Node API image
        run: |
          docker build -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/node-api:${{ github.sha }} \
                        -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/node-api:latest \
                        task-1/mern/backend
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/node-api:${{ github.sha }}
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/node-api:latest

      - name: Build and push React Frontend image
        run: |
          docker build -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/react-frontend:${{ github.sha }} \
                        -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/react-frontend:latest \
                        task-1/mern/frontend
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/react-frontend:${{ github.sha }}
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/react-frontend:latest

      - name: Build and push LAMP image
        run: |
          docker build -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/lamp:${{ github.sha }} \
                        -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/lamp:latest \
                        task-1/lamp/php-app
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/lamp:${{ github.sha }}
          docker push ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_PREFIX }}/lamp:latest

  # -----------------------------------------------
  # Stage 3: Deploy to Staging Server
  # -----------------------------------------------
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/devops-assignment

            # pull latest code
            git fetch origin main
            git reset --hard origin/main

            cd task-1

            # stop and remove old containers cleanly
            docker-compose down --remove-orphans

            # rebuild and restart all containers
            docker-compose up -d --build --force-recreate

            # cleanup old images
            docker image prune -f

            # quick health check
            sleep 10
            echo "Deployment completed at $(date)"
            docker-compose ps
