version: "3.8"

services:

  # ============================================
  # NGINX REVERSE PROXY
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - node-api
      - react-frontend
      - lamp
    networks:
      - app-network
    restart: unless-stopped

  # ============================================
  # MERN STACK
  # ============================================

  # MongoDB
  mongo:
    image: mongo:6
    container_name: mongodb
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - app-network
    restart: unless-stopped

  # Node.js + Express API backend
  node-api:
    build: ./mern/backend
    container_name: node-api
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/merndb
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - app-network
    restart: unless-stopped

  # React frontend (served via nginx inside the container)
  react-frontend:
    build: ./mern/frontend
    container_name: react-frontend
    networks:
      - app-network
    restart: unless-stopped

  # ============================================
  # LAMP STACK
  # ============================================

  # Apache + PHP
  lamp:
    build: ./lamp/php-app
    container_name: apache-php
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpass123
      - MYSQL_DATABASE=lampdb
    depends_on:
      - mysql
    networks:
      - app-network
    restart: unless-stopped

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: lampdb
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    restart: unless-stopped

# ============================================
# VOLUMES
# ============================================
volumes:
  mongo-data:
  mysql-data:

# ============================================
# NETWORKS
# ============================================
networks:
  app-network:
    driver: bridge
