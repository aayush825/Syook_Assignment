events {
    worker_connections 1024;
}

http {
    # basic settings
    sendfile on;
    keepalive_timeout 65;

    # upstream definitions
    upstream mern_frontend {
        server react-frontend:80;
    }

    upstream mern_api {
        server node-api:5000;
    }

    upstream lamp_backend {
        server lamp:80;
    }

    server {
        listen 80;
        server_name _;

        # ---- MERN stack routes ----

        # react frontend
        location /app/ {
            proxy_pass http://mern_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # node api (backend)
        location /app/api/ {
            proxy_pass http://mern_api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- LAMP stack routes ----

        location /legacy/ {
            proxy_pass http://lamp_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # default landing page
        location / {
            return 200 '<!DOCTYPE html>
<html>
<head><title>DevOps Assignment</title></head>
<body style="font-family:Arial;padding:2rem">
<h1>Application Gateway</h1>
<ul>
<li><a href="/app/">MERN Stack App</a></li>
<li><a href="/legacy/">LAMP Stack App</a></li>
</ul>
</body>
</html>';
            add_header Content-Type text/html;
        }
    }
}
