# Nginx Secure Configuration
# This config adds SSL/TLS, rate limiting, and security headers
# Place this file at /etc/nginx/nginx.conf (or mount via Docker volume)
#
# Generate self-signed cert for testing:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/server.key \
#     -out /etc/ssl/certs/server.crt \
#     -subj "/CN=localhost"

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 65;

    # ----- Rate Limiting -----
    # zone: 10mb shared memory, max 10 requests/sec per IP
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=10r/s;

    # stricter limit for API endpoints
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # ----- Logging -----
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ----- Upstream Definitions -----
    upstream mern_frontend {
        server react-frontend:80;
    }

    upstream mern_api {
        server node-api:5000;
    }

    upstream lamp_backend {
        server lamp:80;
    }

    # ----- HTTP → HTTPS Redirect -----
    server {
        listen 80;
        server_name _;

        # redirect all HTTP traffic to HTTPS
        return 301 https://$host$request_uri;
    }

    # ----- HTTPS Server -----
    server {
        listen 443 ssl;
        server_name _;

        # ----- SSL Configuration -----
        ssl_certificate /etc/ssl/certs/server.crt;
        ssl_certificate_key /etc/ssl/private/server.key;

        # modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ----- Security Headers -----
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # hide nginx version
        server_tokens off;

        # ----- Global Rate Limit -----
        limit_req zone=global_limit burst=20 nodelay;

        # ----- MERN Stack Routes -----

        location /app/ {
            proxy_pass http://mern_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /app/api/ {
            # stricter rate limit for API
            limit_req zone=api_limit burst=10 nodelay;

            proxy_pass http://mern_api/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ----- LAMP Stack Routes -----

        location /legacy/ {
            proxy_pass http://lamp_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ----- Default Page -----
        location / {
            return 200 '<!DOCTYPE html>
<html>
<head><title>Application Gateway</title></head>
<body style="font-family:Arial;padding:2rem">
<h1>Application Gateway (Secure)</h1>
<ul>
<li><a href="/app/">MERN Stack</a></li>
<li><a href="/legacy/">LAMP Stack</a></li>
</ul>
</body>
</html>';
            add_header Content-Type text/html;
        }
    }
}
